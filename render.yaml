services:
  - type: web
    name: mero-ticket-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: PYTHON_VERSION
        value: 3.10
    plan: free
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**
        - requirements.txt
        - Procfile
  - type: web
    name: mero-ticket-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist
    plan: free
    autoDeploy: true
    buildFilter:
      paths:
        - frontend/**
