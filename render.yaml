databases:
  - name: mero-ticket-db
    databaseName: meroticket
    user: meroticket

services:
  - type: web
    name: mero-ticket-backend
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt ; python backend/manage.py collectstatic --noinput
    startCommand: gunicorn backend.wsgi:application --chdir backend --log-file -
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: PYTHON_VERSION
        value: 3.10
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: mero-ticket-db
          property: connectionString
    buildFilter:
      paths:
        - backend/**
        - requirements.txt
        - Procfile
        - render.yaml

  - type: worker
    name: mero-ticket-worker
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/manage.py run_background_jobs
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: PYTHON_VERSION
        value: 3.10
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: mero-ticket-db
          property: connectionString
    buildFilter:
      paths:
        - backend/**
        - requirements.txt
        - render.yaml

  - type: web
    name: mero-ticket-frontend
    env: node
    plan: free
    autoDeploy: true
    buildCommand: cd frontend ; npm install ; npm run build
    startCommand: npx serve -s frontend/dist -l 10000
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mero-ticket-backend.onrender.com
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
